version: "3.9"

services:

  # ── FastAPI ────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
      - ./firebase_service_account.json:/app/firebase_service_account.json:ro
    depends_on:
      - redis
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build: .
    command: >
      celery -A app.infrastructure.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=celery
    env_file: .env
    volumes:
      - .:/app
      - ./firebase_service_account.json:/app/firebase_service_account.json:ro
    depends_on:
      - redis
    restart: unless-stopped

  # ── Celery Flower (worker dashboard) ──────────────────────
  flower:
    build: .
    command: >
      celery -A app.infrastructure.workers.celery_app.celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  redis_data: